apis:
- aid: directus:rest-api
  name: Directus REST API
  description: >-
    Auto-generated REST API built on top of any SQL database schema.
    Provides full CRUD operations on all collections, authentication
    endpoints, file management, user and role management, and system
    configuration. The API is dynamically generated from the connected
    database schema and includes filtering, sorting, pagination, and
    field selection via query parameters.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://directus.com/docs/api
  tags:
  - REST
  - CRUD
  - Collections
  - Authentication
  - Files
  properties:
  - type: Documentation
    url: https://directus.com/docs/api
  - type: Reference
    url: https://directus.com/docs/api/items
  - type: Authentication
    url: https://directus.com/docs/auth
- aid: directus:graphql-api
  name: Directus GraphQL API
  description: >-
    Auto-generated GraphQL API that mirrors the REST API surface,
    providing strongly-typed queries and mutations for all collections
    and system endpoints. Supports nested relational queries, filtering,
    sorting, aggregation, and subscriptions via WebSockets. The schema
    is dynamically generated from the connected SQL database.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://directus.com/docs/graphql
  tags:
  - GraphQL
  - Queries
  - Mutations
  - Subscriptions
  - Real-Time
  properties:
  - type: Documentation
    url: https://directus.com/docs/graphql
  - type: GraphQL
    url: graphql/directus-graphql.md
  - type: GraphQLSchema
    url: graphql/directus-schema.graphql
