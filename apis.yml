aid: directus
name: Directus
kind: opensource
description: >-
  Open-source data platform that wraps any SQL database with a REST and
  GraphQL API, auto-generated from the schema, plus a no-code admin app
  for data management. Directus turns any new or existing SQL database
  (PostgreSQL, MySQL, SQLite, MS SQL, OracleDB, CockroachDB) into an
  instant REST and GraphQL API with a visual Data Studio for non-technical
  users. The platform includes policy-based access control, an automation
  engine (Flows), a built-in AI assistant, digital asset management,
  real-time WebSockets, and an MCP server for AI agent integration.
  Deployable as a self-hosted open-source project or as Directus Cloud.
