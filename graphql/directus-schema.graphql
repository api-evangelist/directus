# ---------------------------------------------------------------------------
# Root Query type — /graphql/system
# ---------------------------------------------------------------------------

"""
System-scope Query type. Available at /graphql/system.
User-space /graphql exposes the same query patterns for custom collections
(e.g. articles, products) generated from the connected SQL database schema.
"""
type Query {
  # ---- Server ----
  """Ping the server. Returns 'pong'."""
  server_ping: String

  """General server information."""
  server_info: server_info

  """Server health status (JSON object)."""
  server_health: JSON

  """OpenAPI 3 specification (JSON)."""
  server_specs_oas: JSON

  """GraphQL SDL for the given scope."""
  server_specs_graphql(scope: graphql_sdl_scope): String

  # ---- Users ----
  """List all users."""
  users(
    filter: directus_users_filter
    sort: [String]
    limit: Int
    offset: Int
    page: Int
    search: String
  ): [directus_users]

  """Read a user by primary key."""
  users_by_id(id: ID!): directus_users

  """The currently authenticated user."""
  users_me: directus_users

  """Aggregate users."""
  users_aggregated(
    groupBy: [String]
    filter: directus_users_filter
    limit: Int
    offset: Int
    page: Int
    search: String
    sort: [String]
  ): [directus_users_aggregated]

  # ---- Roles ----
  roles(
    filter: directus_roles_filter
    sort: [String]
    limit: Int
    offset: Int
    page: Int
    search: String
  ): [directus_roles]

  roles_by_id(id: ID!): directus_roles

  """Roles assigned to the current user."""
  roles_me: [directus_roles]

  roles_aggregated(
    groupBy: [String]
    filter: directus_roles_filter
    limit: Int
    offset: Int
    page: Int
    search: String
    sort: [String]
  ): [directus_roles_aggregated]

  # ---- Policies ----
  policies(
    filter: directus_policies_filter
    sort: [String]
    limit: Int
    offset: Int
    page: Int
    search: String
  ): [directus_policies]

  policies_by_id(id: ID!): directus_policies

  """Policy globals for the current user."""
  policies_me_globals: policy_me_globals_type

  policies_aggregated(
    groupBy: [String]
    filter: directus_policies_filter
    limit: Int
    offset: Int
    page: Int
    search: String
