# Directus GraphQL Schema (SDL)
# Derived from the Directus open-source codebase: https://github.com/directus/directus
# Source files: api/src/services/graphql/
#
# TWO endpoints are exposed:
#   /graphql        — user-space (dynamic collections defined by the project)
#   /graphql/system — built-in system collections listed below
#
# The user-space schema is fully dynamic: every SQL collection becomes a type
# automatically, so only the pattern is shown here.  The system schema is fixed
# and documented in full.

# ---------------------------------------------------------------------------
# Custom Scalars
# ---------------------------------------------------------------------------

"""ISO 8601 date string (YYYY-MM-DD)."""
scalar Date

"""ISO 8601 date-time string."""
scalar DateTime

"""A JSON value (object, array, string, number, boolean, or null)."""
scalar JSON

"""A 64-bit integer serialised as a string."""
scalar BigInt

"""A bcrypt / argon2 hash string. Write-only; never returned in reads."""
scalar Hash

"""A GeoJSON value."""
scalar GeoJSON

"""A value that may be either a String or a Float (used in filter args)."""
scalar StringOrFloat

"""Void — mutations that return no meaningful value."""
scalar Void

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

"""Authentication response mode."""
enum auth_mode {
  """Tokens are returned in the JSON response body."""
  json
  """Tokens are set as HTTP-only cookies."""
  cookie
  """A single session cookie is used."""
  session
}

"""Subscription event type filter."""
enum EventEnum {
  create
  update
  delete
}

"""Scope for the SDL introspection query."""
enum graphql_sdl_scope {
  items
  system
}

# ---------------------------------------------------------------------------
# Common output types
# ---------------------------------------------------------------------------

"""Return type for bulk-delete mutations."""
type delete_many {
  ids: [ID]!
}

"""Return type for single-item delete mutations."""
type delete_one {
  id: ID!
}

# ---------------------------------------------------------------------------
# Date/time function types (virtual fields on date/time columns)
# ---------------------------------------------------------------------------

type date_functions {
  year: Int
  month: Int
  week: Int
  day: Int
  weekday: Int
}

type time_functions {
  hour: Int
  minute: Int
  second: Int
}

type datetime_functions {
  year: Int
  month: Int
  week: Int
  day: Int
  weekday: Int
  hour: Int
  minute: Int
  second: Int
}

type count_functions {
  count: Int
}

