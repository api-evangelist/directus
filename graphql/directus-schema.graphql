type Mutation {
  # ---- Auth ----
  """Authenticate with email + password. Returns tokens."""
  auth_login(
    email: String!
    password: String!
    mode: auth_mode
    otp: String
  ): auth_tokens

  """Refresh an access token."""
  auth_refresh(
    refresh_token: String
    mode: auth_mode
  ): auth_tokens

  """Invalidate a refresh token / session."""
  auth_logout(
    refresh_token: String
    mode: auth_mode
  ): Boolean

  """Request a password-reset email."""
  auth_password_request(email: String!, reset_url: String): Boolean

  """Complete a password reset using the emailed token."""
