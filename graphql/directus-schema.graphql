# ---------------------------------------------------------------------------
# System collection types — /graphql/system
# ---------------------------------------------------------------------------

"""A Directus user account."""
type directus_users {
  id: ID!
  first_name: String
  last_name: String
  email: String
  password: Hash
  location: String
  title: String
  description: String
  tags: JSON
  avatar: directus_files
  language: String
  tfa_secret: Hash
  status: String
  role: directus_roles
  token: Hash
  last_access: DateTime
  last_page: String
  provider: String
  external_identifier: String
  auth_data: JSON
  email_notifications: Boolean
  appearance: String
  theme_dark: String
  theme_light: String
  theme_light_overrides: JSON
  theme_dark_overrides: JSON
  policies: [directus_access]
}

"""A file uploaded to Directus."""
type directus_files {
  id: ID!
  storage: String!
  filename_disk: String
  filename_download: String!
  title: String
  type: String
  folder: directus_folders
  uploaded_by: directus_users
  created_on: DateTime
  modified_by: directus_users
  modified_on: DateTime
  charset: String
  filesize: BigInt
  width: Int
  height: Int
  duration: Int
  embed: String
  description: String
  location: String
  tags: JSON
  metadata: JSON
  focal_point_x: Int
  focal_point_y: Int
  tus_id: String
  tus_data: JSON
  uploaded_on: DateTime
}

"""A file storage folder."""
type directus_folders {
  id: ID!
  name: String!
  parent: directus_folders
}

"""A Directus role."""
type directus_roles {
  id: ID!
  name: String!
  icon: String
  description: String
  parent: directus_roles
  children: [directus_roles]
  users: [directus_users]
  policies: [directus_access]
}

"""An access control policy."""
type directus_policies {
  id: ID!
  name: String!
  icon: String
  description: String
  ip_access: JSON
  enforce_tfa: Boolean!
  admin_access: Boolean!
  app_access: Boolean!
  permissions: [directus_permissions]
  roles: [directus_access]
  users: [directus_access]
}

"""A role-to-policy or user-to-policy binding."""
type directus_access {
  id: ID!
  role: directus_roles
  user: directus_users
  policy: directus_policies!
  sort: Int
}

"""A permission rule."""
type directus_permissions {
  id: ID
  collection: String!
  action: String!
  permissions: JSON
  validation: JSON
  presets: JSON
  fields: JSON
  policy: directus_policies
}

"""A schema activity event."""
type directus_activity {
  id: ID!
  action: String!
  user: directus_users
  timestamp: DateTime!
  ip: String
  user_agent: String
  collection: String!
  item: String!
  comment: String
  origin: String
  revisions: [directus_revisions]
}

"""A data revision snapshot."""
type directus_revisions {
  id: ID!
  activity: directus_activity!
  collection: String!
  item: String!
  data: JSON
  delta: JSON
  parent: directus_revisions
  version: directus_versions
}

"""A saved filter preset."""
type directus_presets {
  id: ID!
  bookmark: String
  user: directus_users
  role: directus_roles
  collection: String
  search: String
  layout: String
  layout_query: JSON
  layout_options: JSON
  refresh_interval: Int
  filter: JSON
  icon: String
  color: String
}

"""A translation string."""
type directus_translations {
